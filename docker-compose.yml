version: '3.8'

services:
  mysql:
    image: mysql:8.0.33
    container_name: agentmall-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ywy
      MYSQL_DATABASE: agentmall
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./server/src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7.2.4-alpine
    container_name: agentmall-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --requirepass ywy

volumes:
  mysql-data:
  redis-data:
